<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>grokery — TOPIC</title>
<!--
  grokery HTML brief template. Self-contained: inline CSS, no JS, no external
  assets. Fill the placeholders (TOPIC, WINDOW, DATE, SOURCES) and the CONTENT
  slot below, then save as the brief file. Keep it offline-ready.
-->
<style>
:root{
  color-scheme:dark;
  --bg:#000;--card:#16181c;--border:#2f3336;--text:#e7e9ea;--text2:#c8cdd2;--dim:#71767b;
  --blue:#1d9bf0;--purple:#7856ff;--green:#00ba7c;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);
 font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;letter-spacing:-.003em}
.wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px}
.badge{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
 color:#fff;background:linear-gradient(135deg,var(--blue),var(--purple));padding:5px 12px;border-radius:999px}
h1{font-size:30px;font-weight:850;letter-spacing:-.02em;margin:18px 0 4px}
.meta{color:var(--dim);font-size:13px;margin-bottom:8px}
.verdict{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blue);
 border-radius:12px;padding:14px 16px;margin:18px 0;color:var(--text2)}
h2{font-size:21px;font-weight:800;margin:32px 0 6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
h3{font-size:16px;font-weight:750;color:#7cc6f7;margin:20px 0 4px}
p,li{color:var(--text2)}
ul{margin:8px 0;padding-left:20px}li{margin:5px 0}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
strong{color:#f3f5f6}
code{font-family:ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;font-size:.86em;
 background:var(--card);border:1px solid var(--border);border-radius:5px;padding:.05em .4em;color:#cfd9e0}
.bar{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--purple));margin:2px 0 8px}
.foot{margin-top:40px;padding-top:16px;border-top:1px solid var(--border);color:var(--dim);font-size:13px}
@media print{body{background:#fff;color:#000}.verdict,code{background:#f4f4f4}a{color:#06c}}
</style></head>
<body><div class="wrap">
  <span class="badge">grokery · signal brief</span>
  <h1>TOPIC</h1>
  <div class="meta">Window: last WINDOW days · DATE · sources: SOURCES</div>

  <div class="verdict"><strong>Verdict —</strong> one-to-three-sentence dominant take + strongest counter-take.</div>

  <!-- CONTENT: themes as <h2>, sub-points as <h3>/<ul>, citations as inline <a>,
       engagement numbers in <strong>. Optional <div class="bar"></div> under a
       heading to visualize relative engagement. -->

  <!-- Footer: state which sources actually returned, e.g. "Sources: X, HN, GitHub, Polymarket". Do not claim sources that failed or were skipped. -->
  <div class="foot">Generated by <code>grokery</code> — grok-powered cross-platform signal scan. · Ranked by engagement, not SEO. · Sources: SOURCES.</div>
</div></body></html>
