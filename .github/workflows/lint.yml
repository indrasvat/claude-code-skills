name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # actions/checkout v5.0.1 — pinned to a SHA so a flaky mutable-tag
        # fetch can't silently break CI (we hit one on 2026-05-23 post-merge)
        # and so unreviewed action changes can't land via @v4/@master.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # Use the same `make lint` target developers run locally so CI and local
      # checks never diverge (single source of truth in the Makefile). shellcheck
      # is preinstalled on ubuntu-latest; `make lint` lints tracked shell scripts
      # via `git ls-files` at severity=warning and fails loudly if it's missing.
      - name: Run make lint
        run: make lint

  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # Parse each SKILL.md frontmatter with js-yaml (the engine skills.sh uses)
      # and cross-check discovery with the real `skills` CLI. Logic lives in the
      # script so it's runnable locally via `make validate-skills`. Node ships on
      # ubuntu-latest; the script installs js-yaml on demand.
      - name: Validate skills
        run: make validate-skills
